<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>CONTROLE MOBILE - TV SENADO</title>
    <style>
        /* =====================================================================
           VARIÁVEIS GLOBAIS E BASE (OTIMIZADO PARA MOBILE)
           ===================================================================== */
        :root { 
            --bg-body: #f4f7f9; 
            --bg-card: #ffffff; 
            --accent-blue: #0084ff; 
            --text-main: #1e293b; 
            --text-dim: #64748b; 
            --border-light: #e2e8f0;
            
            --status-aguardando: #0084ff; 
            --status-iniciado: #28a745; 
            --status-suspenso: #ffc107; 
            --status-encerrado: #dc3545; 
            --status-cancelado: #ff6600; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; } /* Remove o flash azul feio ao tocar em botões no celular */
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; /* Fontes nativas de celular */
            background: var(--bg-body); 
            margin: 0; padding: 0; 
            color: var(--text-main);
            display: flex; flex-direction: column; 
            /* No mobile, deixamos o body rolar naturalmente se a tela for pequena */
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        /* =====================================================================
           CABEÇALHO (TOP BAR) - FIXO NO TOPO
           ===================================================================== */
        .top-bar { 
            background: #0f172a; color: white; 
            padding: 12px 15px; 
            display: flex; flex-direction: column; gap: 12px; /* Empilha o título e os botões */
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            position: sticky; top: 0; z-index: 50; /* Fica preso no topo ao rolar */
        }
        .top-bar h1 { margin: 0; font-size: 16px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #e2e8f0; text-align: center; }
        .top-bar span { color: var(--accent-blue); }
        
        .screen-controls { display: flex; gap: 8px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .btn-screen { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; flex: 1; /* Botões esticam para preencher o espaço */ min-width: 80px; }
        
        .btn-clear-all { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; flex: none; width: 100%; margin-bottom: 4px; } /* Botão de limpar ganha linha própria */
        .btn-pause { background: #475569; color: white; }
        .btn-play { background: #10b981; color: white; }

        /* =====================================================================
           ÁREA DO FORMULÁRIO (1 COLUNA)
           ===================================================================== */
        .form-section { padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .form-card { 
            background: white; padding: 20px 15px; border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            width: 100%; max-width: 500px; 
        }
        .form-card h2 { color: #1e293b; margin: 0 0 15px 0; font-size: 18px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; text-align: center; }
        
        #alerta-sinal { display: none; background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; font-weight: bold; text-align: center; border: 1px solid #fca5a5; }

        /* Tudo em 1 coluna */
        .form-grid { display: flex; flex-direction: column; gap: 12px; }
        
        .field { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-hora-container { position: relative; display: flex; align-items: center; }
        .input-hora-container input[type="text"] { flex: 1; padding-right: 40px; }
        .input-hora-container input[type="time"] { position: absolute; right: 5px; width: 30px; height: 30px; border: none; background: transparent; }

        /* Inputs maiores para facilitar o toque no celular */
        input { 
            width: 100%; box-sizing: border-box; padding: 14px 12px; 
            border: 1px solid #cbd5e1; border-radius: 8px; 
            font-size: 16px; /* Fonte maior (16px evita zoom automático no iPhone) */
            outline: none; background: #f8fafc; color: #0f172a; font-weight: 600; 
        }
        input:focus { border-color: var(--accent-blue); background: #fff; box-shadow: 0 0 0 3px rgba(0, 132, 255, 0.15); }
        
        /* Botão "Lançar na TV" Gigante */
        .btn-container { margin-top: 10px; }
        .btn-add { 
            width: 100%; padding: 16px; border: none; border-radius: 8px; 
            background: var(--accent-blue); color: white; font-weight: 800; 
            text-transform: uppercase; font-size: 16px; letter-spacing: 1px; 
            box-shadow: 0 4px 10px rgba(0, 132, 255, 0.3); 
        }
        .btn-edit-mode { background: #ffc107 !important; color: #000 !important; box-shadow: 0 4px 10px rgba(255, 193, 7, 0.3); }

        /* =====================================================================
           A BARRA LATERAL / LISTA DE PAUTAS (Fica embaixo no mobile)
           ===================================================================== */
        .sidebar { 
            width: 100%; background: #fff; padding: 20px 15px; 
            border-top: 2px solid var(--border-light); 
        }
        .sidebar h2 { font-size: 18px; color: #0f172a; margin: 0 0 15px 0; border-bottom: 3px solid #0f172a; padding-bottom: 8px; text-transform: uppercase; text-align: center; }
        
        .card-pauta { border: 1px solid #dee2e6; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
        .card-pauta b { font-size: 15px; line-height: 1.3; display: block; margin-bottom: 10px; color: #1e293b; }
        
        .glow-iniciada { background: rgba(40, 167, 69, 0.05); border-left: 5px solid var(--status-iniciado); }
        .glow-suspensa { background: rgba(255, 193, 7, 0.1); border-left: 5px solid var(--status-suspenso); }
        .glow-encerrada { background: rgba(220, 53, 69, 0.05); border-left: 5px solid var(--status-encerrado); }
        .glow-cancelada { background: rgba(255, 102, 0, 0.05); border-left: 5px solid var(--status-cancelado); }
        .glow-aguardando { background: rgba(0, 132, 255, 0.05); border-left: 5px solid var(--status-aguardando); }

        .glow-header-iniciada { color: var(--status-iniciado) !important; border-bottom-color: var(--status-iniciado) !important; }
        .glow-header-suspensa { color: var(--status-suspenso) !important; border-bottom-color: var(--status-suspenso) !important; }
        .glow-header-encerrada { color: var(--status-encerrado) !important; border-bottom-color: var(--status-encerrado) !important; }
        .glow-header-cancelada { color: var(--status-cancelado) !important; border-bottom-color: var(--status-cancelado) !important; }
        .glow-header-aguardando { color: var(--status-aguardando) !important; border-bottom-color: var(--status-aguardando) !important; }

        /* Grade de botões de status (2x2 ou 3x2 para celular) */
        .status-btns { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        
        /* Botões mais altos (padding maior) para não errar o toque do dedo */
        .btn-status { border: none; padding: 10px 4px; border-radius: 6px; font-size: 11px; font-weight: bold; color: white; text-transform: uppercase; opacity: 0.6; }
        
        .btn-active { opacity: 1 !important; border: 1px solid rgba(0,0,0,0.3); font-weight: 900; }

        .btn-verde { background: var(--status-iniciado); } 
        .btn-amarelo { background: var(--status-suspenso); color: #000; } 
        .btn-vermelho { background: var(--status-encerrado); }
        .btn-laranja { background: var(--status-cancelado); } 
        .btn-reset { background: var(--status-aguardando); } 
        .btn-edit { background: #6f42c1; opacity: 1 !important; } 
        .btn-del { background: #000; grid-column: span 2; opacity: 1 !important; padding: 12px 4px; } /* Botão Deletar Gigante na base */
    </style>
</head>

<body>

<datalist id="lista-dtv">
    <option value="BRUNA"><option value="PAULO CESAR"><option value="CELINA YUZUKI"><option value="CLEOMAR">
    <option value="DANIEL NAZARETH"><option value="DANIEL RESENDE"><option value="EDSON"><option value="FELIPE BELICH">
    <option value="FRANKLIN"><option value="MARCÃO"><option value="MOZANIEL"><option value="OTÁVIO">
    <option value="PAULO CESAR"><option value="PAULO FELIPE"><option value="RANGEL"><option value="SERGINHO">
    <option value="VINICIUS"><option value="VIVI"><option value="WAGNER">
</datalist>
<datalist id="lista-libra">
    <option value="1"><option value="2"><option value="3"><option value="4"><option value="5"><option value="6"><option value="7"><option value="8">
    <option value="PC1"><option value="PC2"><option value="PC3">
</datalist>
<datalist id="lista-xconv"> 
    <option value="1"><option value="2"><option value="3"><option value="4"><option value="5"><option value="6"><option value="7"><option value="8">
    <option value="X50-1"><option value="X50-2"><option value="X50-3"><option value="1-2"><option value="3-4"><option value="5-6"><option value="7-8">
</datalist>
<datalist id="lista-comissoes">
    <option value="CAE"><option value="CAS"><option value="CCJ"><option value="CE"><option value="CMA"><option value="CDH">
    <option value="CRE"><option value="CI"><option value="CRA"><option value="CCT"><option value="CDHM"><option value="CDR"> 
    <option value="CTFC"><option value="CSP"><option value="CCDD"><option value="CESP"><option value="CDD"><option value="CASP">
    <option value="CCS"><option value="CANCER"><option value="CFT"><option value="CDC"><option value="CLP"><option value="CMO"> 
    <option value="CCAI"><option value="CMCVM"><option value="CMACOP30"><option value="CTCIVIL">
</datalist>
<datalist id="lista-salas">
    <option value="2"><option value="3"><option value="6"><option value="7"><option value="9"><option value="13"><option value="15"><option value="19">
    <option value="CT-01"><option value="CT-02"><option value="CT-03"><option value="CT-04"><option value="CT-05">
    <option value="CT-06"><option value="CT-07"><option value="CT-08"><option value="CT-09">
</datalist>
<datalist id="lista-gc-estacao">
    <option value="1"><option value="2"><option value="3"><option value="4"><option value="5"><option value="6"><option value="7"><option value="8">
</datalist>
<datalist id="lista-gc-op">
    <option value="ALLAN"><option value="BETÃO"><option value="DIL"><option value="DUDA"><option value="DULCE">
    <option value="ELIZANGELA"><option value="FABRÍCIO"><option value="LUCILA"><option value="MARLA"><option value="MINA">
    <option value="TEREZA"><option value="THIAGO AGUIAR"><option value="VANESSA CRISTHINA"><option value="GABRIEL">
</datalist>

<header class="top-bar">
    <h1>Controle <span>TV Senado</span></h1>
    <div class="screen-controls">
        <button class="btn-screen btn-clear-all" onclick="limparTodaPauta()">🗑 Limpar Tudo</button>
        <button class="btn-screen btn-pause" onclick="setScroll(false)">⏸ Pausar ON-AIR</button>
        <button class="btn-screen btn-play" onclick="setScroll(true)">▶ Play ON-AIR</button>
    </div>
</header>

<div class="form-section">
    <div class="form-card">
        <h2 id="titulo-form">Lançar Pauta</h2>
        <div id="alerta-sinal">⚠️ CONFLITO NO XCONV!</div>
        <input type="hidden" id="f-id">
        
        <div class="form-grid">
            <div class="field">
                <label>Hora</label>
                <div class="input-hora-container">
                    <input type="text" id="f-hora" maxlength="5" placeholder="00:00" inputmode="numeric" onblur="validarFormatoHora(this)">
                    <input type="time" id="f-hora-picker" onchange="sincronizarTimePicker(this)">
                </div>
            </div>
            <div class="field"><label>Comissão</label><input type="text" id="f-comissao" list="lista-comissoes"></div>
            <div class="field"><label>Sala</label><input type="text" id="f-sala" list="lista-salas"></div>
            <div class="field"><label>Libras</label><input type="text" id="f-libra" list="lista-libra"></div>
            <div class="field"><label>GC (Estação)</label><input type="text" id="f-gc" list="lista-gc-estacao" inputmode="numeric"></div>                
            <div class="field"><label>XCONV / Fibra</label><input type="text" id="f-xconv" list="lista-xconv" onkeyup="verificarConflitoSinal()"></div>
            <div class="field"><label>DTV</label><input type="text" id="f-dtv" list="lista-dtv"></div>
            <div class="field"><label>GC Operação</label><input type="text" id="f-gcop" list="lista-gc-op"></div>
            
            <div class="btn-container">
                <button class="btn-add" id="btn-salvar" onclick="lancar()">Salvar</button>
            </div>
        </div>
    </div>
</div>

<div class="sidebar">
    <h2>Pauta Atual</h2>
    <div id="lista-status"></div>
</div>

<script>
    function limparTodaPauta() {
        if (confirm("Tem certeza que deseja apagar TODAS as pautas? Isso limpará a tela do ON-AIR e não pode ser desfeito.")) {
            localStorage.setItem('pauta_senado_v5', '[]'); 
            resetForm(); 
            renderSidebar(); 
            window.dispatchEvent(new Event('storage')); 
        }
    }

    function validarFormatoHora(input) {
        let v = input.value.replace(/\D/g, "");
        if (v === "") return;
        if (v.length <= 2) v = v.padStart(2, '0') + "00";
        else if (v.length === 3) v = v.padStart(4, '0');

        let horas = v.substring(0, 2);
        let minutos = v.substring(2, 4);

        if (parseInt(horas) > 23) horas = "23";
        if (parseInt(minutos) > 59) minutos = "59";

        input.value = horas + ":" + minutos;
        if(document.getElementById('f-hora-picker')) document.getElementById('f-hora-picker').value = input.value;
    }

    function sincronizarTimePicker(picker) {
        document.getElementById('f-hora').value = picker.value;
    }

    function setScroll(s) { localStorage.setItem('tv_scroll_active', s); }

    function verificarConflitoSinal() {
        const s = document.getElementById('f-xconv').value.trim().toUpperCase();
        const editId = document.getElementById('f-id').value;
        const p = JSON.parse(localStorage.getItem('pauta_senado_v5')) || [];
        const conflito = p.some(i => i.xconv.trim().toUpperCase() === s && i.id.toString() !== editId);
        document.getElementById('alerta-sinal').style.display = (s !== "" && conflito) ? 'block' : 'none';
    }

    function lancar() {
        const idExistente = document.getElementById('f-id').value;
        const horaVal = document.getElementById('f-hora').value;
        
        if(!horaVal || !document.getElementById('f-comissao').value) return alert("Preencha Hora e Comissão!");

        let p = JSON.parse(localStorage.getItem('pauta_senado_v5')) || [];
        let statusAtual = 'aguardando';

        if (idExistente) {
            const itemAntigo = p.find(x => x.id == idExistente);
            if (itemAntigo) statusAtual = itemAntigo.status;
        }

        const d = { 
            id: idExistente ? parseInt(idExistente) : Date.now(), 
            hora: horaVal, comissao: document.getElementById('f-comissao').value, 
            sala: document.getElementById('f-sala').value, gc: document.getElementById('f-gc').value, 
            libra: document.getElementById('f-libra').value, xconv: document.getElementById('f-xconv').value, 
            dtv: document.getElementById('f-dtv').value, gcop: document.getElementById('f-gcop').value, 
            status: statusAtual
        };

        if (idExistente) {
            const index = p.findIndex(item => item.id == idExistente);
            if(index !== -1) p[index] = d; else p.push(d);
        } else { p.push(d); }

        localStorage.setItem('pauta_senado_v5', JSON.stringify(p));
        window.dispatchEvent(new Event('storage')); 
        
        resetForm(); renderSidebar();
        
        // No celular, rola suavemente para baixo para ver a pauta recém adicionada
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function prepararEdicao(id) {
        const p = JSON.parse(localStorage.getItem('pauta_senado_v5')) || [];
        const d = p.find(i => i.id === id);
        if(d) {
            document.getElementById('f-id').value = d.id;
            document.getElementById('f-hora').value = d.hora;
            if(document.getElementById('f-hora-picker')) document.getElementById('f-hora-picker').value = d.hora;
            document.getElementById('f-comissao').value = d.comissao;
            document.getElementById('f-sala').value = d.sala;
            document.getElementById('f-gc').value = d.gc;
            document.getElementById('f-gcop').value = d.gcop;
            document.getElementById('f-dtv').value = d.dtv;
            document.getElementById('f-libra').value = d.libra;
            document.getElementById('f-xconv').value = d.xconv;
            document.getElementById('titulo-form').innerText = "Editando...";
            document.getElementById('btn-salvar').innerText = "Atualizar TV";
            document.getElementById('btn-salvar').classList.add('btn-edit-mode');
            
            // No celular, rola suavemente para o topo para editar
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function resetForm() {
        document.getElementById('f-id').value = "";
        ["f-hora", "f-comissao", "f-sala", "f-dtv", "f-gc", "f-gcop", "f-libra", "f-xconv"].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.value = "";
        });
        if(document.getElementById('f-hora-picker')) document.getElementById('f-hora-picker').value = "";
        document.getElementById('titulo-form').innerText = "Lançar Pauta";
        document.getElementById('btn-salvar').innerText = "Salvar";
        document.getElementById('btn-salvar').classList.remove('btn-edit-mode');
    }

    function mudarStatus(id, s) {
        let p = JSON.parse(localStorage.getItem('pauta_senado_v5')) || [];
        const idx = p.findIndex(i => i.id === id);
        if(idx !== -1) { 
            p[idx].status = s; 
            localStorage.setItem('pauta_senado_v5', JSON.stringify(p)); 
            window.dispatchEvent(new Event('storage'));
            renderSidebar(); 
        }
    }

    function remover(id) { 
        if(confirm("Remover da pauta?")) { 
            let p = JSON.parse(localStorage.getItem('pauta_senado_v5')) || []; 
            p = p.filter(i => i.id !== id); 
            localStorage.setItem('pauta_senado_v5', JSON.stringify(p)); 
            window.dispatchEvent(new Event('storage'));
            renderSidebar(); 
        } 
    }

    function renderSidebar() {
        let p = JSON.parse(localStorage.getItem('pauta_senado_v5')) || [];
        const l = document.getElementById('lista-status');
        l.innerHTML = '';
        
        const peso = { 'suspensa': 1, 'aguardando': 2, 'iniciada': 3, 'cancelada': 4, 'encerrada': 5 };
        
        p.sort((a, b) => {
            const statusA = a.status || 'aguardando';
            const statusB = b.status || 'aguardando';
            if (peso[statusA] !== peso[statusB]) return peso[statusA] - peso[statusB];
            return a.hora.localeCompare(b.hora);
        });

        let statusAtualContexto = ''; 

        p.forEach(i => {
            const st = i.status || 'aguardando';

            if (st !== statusAtualContexto) {
                l.innerHTML += `<div class="glow-header-${st}" style="font-size: 13px; font-weight: 800; text-transform: uppercase; margin: 15px 0 10px 0; border-bottom: 2px solid; padding-bottom: 4px;">${st}</div>`;
                statusAtualContexto = st;
            }

            l.innerHTML += `
                <div class="card-pauta glow-${st}">
                    <b style="text-transform: uppercase;">${i.status} - ${i.hora} - ${i.comissao} </b>
                    <div class="status-btns">
                        <button class="btn-status btn-verde ${st === 'iniciada' ? 'btn-active' : ''}" onclick="mudarStatus(${i.id}, 'iniciada')">Iniciado</button>
                        <button class="btn-status btn-amarelo ${st === 'suspensa' ? 'btn-active' : ''}" onclick="mudarStatus(${i.id}, 'suspensa')">Suspenso</button>
                        <button class="btn-status btn-vermelho ${st === 'encerrada' ? 'btn-active' : ''}" onclick="mudarStatus(${i.id}, 'encerrada')">Encerrado</button>
                        <button class="btn-status btn-laranja ${st === 'cancelada' ? 'btn-active' : ''}" onclick="mudarStatus(${i.id}, 'cancelada')">Cancelado</button>
                        <button class="btn-status btn-reset ${st === 'aguardando' ? 'btn-active' : ''}" onclick="mudarStatus(${i.id}, 'aguardando')">Aguardar</button>
                        <button class="btn-status btn-edit" onclick="prepararEdicao(${i.id})">Editar</button>
                        <button class="btn-status btn-del" onclick="remover(${i.id})">Remover</button>
                    </div>
                </div>`;
        });
    }

    window.onload = () => { 
        localStorage.setItem('tv_scroll_active', 'true'); 
        renderSidebar(); 
    };
    const firebaseConfig = {
  apiKey: "AIzaSyCRZXbRFqotcxdPAl6ptg06jDf_GpW2De8",
  authDomain: "sistema-tvsenado.firebaseapp.com",
  databaseURL: "https://sistema-tvsenado-default-rtdb.firebaseio.com",
  projectId: "sistema-tvsenado",
  storageBucket: "sistema-tvsenado.firebasestorage.app",
  messagingSenderId: "895965318952",
  appId: "1:895965318952:web:3eab09f06ce06d76674a1d"
};
</script>
</body>
