<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>MONITOR MOBILE - TV SENADO</title>
    <style>
        /* =====================================================================
           1. VARIÁVEIS GLOBAIS (:root)
           O QUE FAZ: Define a paleta de cores noturna do painel de leitura.
           ===================================================================== */
        :root { 
            --bg-body: #05070a;         /* Preto profundo */
            --bg-card: #0d1117;         /* Fundo do card (Cinza bem escuro) */
            --accent-blue: #2f81f7;     /* Azul de destaque para a Hora */
            
            --text-main: #c9d1d9;       /* Letra principal cinza clara */
            --text-dim: #8b949e;        /* Letra de subtítulo e legenda */
            
            /* Cores dos Status da Comissão */
            --status-aguardando: #2f81f7; 
            --status-iniciado: #238636; 
            --status-suspenso: #d29922; 
            --status-encerrado: #f85149; 
            --alerta-urgente: #ff0055;  /* Vermelho alerta piscante */
        }
        
        /* =====================================================================
           2. BASE E RESET DO CELULAR
           O QUE FAZ: Tira margens, prepara as fontes e destrava a tela para
           o usuário poder rolar com o próprio dedo sem cortes.
           ===================================================================== */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-body); color: var(--text-main); 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 0; 
            /* NO CELULAR: A página precisa ter altura livre para rolar nativamente */
            height: auto; min-height: 100vh;
            overflow-x: hidden; /* Corta só o vazamento lateral */
            overflow-y: auto;   /* Destrava a rolagem com o dedo */
        }
        
        /* =====================================================================
           3. LAYOUT PRINCIPAL EMPILHADO
           ===================================================================== */
        .main-layout { display: flex; flex-direction: column; width: 100vw; height: auto; }

        .screen-container { 
            display: flex; flex-direction: column; 
            padding: 10px; box-sizing: border-box; gap: 8px; 
            overflow: visible; /* Container livre para crescer */
        }

        /* =====================================================================
           4. CABEÇALHO DO CELULAR
           ===================================================================== */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; 
            /* Fica grudado no topo da tela do celular enquanto o dedo rola pra baixo */
            position: sticky; top: 0; z-index: 50; 
            background-color: var(--bg-body); /* Para não ver o texto passando por trás */
        }
        
        #clock { font-size: 1.5rem; font-family: 'JetBrains Mono', monospace; color: var(--accent-blue); font-weight: 700; }
        
        .active-area { display: flex; flex-direction: column; gap: 15px; overflow: visible; padding-top: 5px; }

        /* =====================================================================
           5. CAIXAS INTELIGENTES DE STATUS (Os painéis de fundo transparentes)
           ===================================================================== */
        .group-wrapper { 
            display: none; 
            flex-direction: column; overflow: visible; 
            background: rgba(255,255,255,0.02); border-radius: 8px; padding: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #group-encerrada { opacity: 0.7; } 

        .group-header { 
            font-size: 0.8rem; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 1px; margin-bottom: 8px; padding-left: 8px;
            display: flex; align-items: center; gap: 8px; 
        }
        
        .title-iniciada { color: var(--status-iniciado); border-left: 3px solid var(--status-iniciado); }
        .title-suspensa { color: var(--status-suspenso); border-left: 3px solid var(--status-suspenso); }
        .title-encerrada { color: var(--status-encerrado); border-left: 3px solid var(--status-encerrado); }
        .title-aguardando { color: var(--status-aguardando); border-left: 3px solid var(--status-aguardando); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; margin-bottom: 10px; }

        /* =====================================================================
           6. LISTA DOS CARDS (Empilhados 100% da tela)
           ===================================================================== */
        .scroll-area, .sidebar-list { 
            display: flex; flex-direction: column; /* Força 1 card debaixo do outro */
            overflow: visible; gap: 10px; 
        }

        /* =====================================================================
           7. O CARD DA PAUTA (Adaptado para tela pequena)
           ===================================================================== */
        .pauta-card {
            background: var(--bg-card); border-radius: 8px; padding: 15px; /* Aumentado para toque */
            box-sizing: border-box; 
            border-left: 4px solid transparent;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; justify-content: space-between;
            width: 100%; /* Ocupa a tela inteira lateralmente */
        }

        /* Fundo e borda baseada no status */
        .pauta-card.status-iniciada { border-left-color: var(--status-iniciado); background: linear-gradient(90deg, rgba(35,134,54,0.05) 0%, rgba(13,17,23,0) 100%); }
        .pauta-card.status-suspensa { border-left-color: var(--status-suspenso); background: linear-gradient(90deg, rgba(210,153,34,0.05) 0%, rgba(13,17,23,0) 100%); }
        .pauta-card.status-aguardando { border-left-color: var(--status-aguardando); }
        .pauta-card.status-encerrada { border-left-color: var(--status-encerrado); }

        /* Pisca sombra verde quando no ar */
        @keyframes pulse-onair { 0% { box-shadow: -2px 0 8px rgba(35,134,54,0); } 50% { box-shadow: -2px 0 12px rgba(35,134,54,0.6); } 100% { box-shadow: -2px 0 8px rgba(35,134,54,0); } }
        .pauta-card.status-iniciada { animation: pulse-onair 2.5s infinite; }

        /* Pisca sombra vermelha e borda quando atrasada */
        @keyframes pulse-urgente-card { 
            0% { border-color: #ff0055; box-shadow: inset 0 0 5px rgba(255, 0, 85, 0.2), 0 0 0 rgba(255, 0, 85, 0.2); } 
            50% { border-color: #cc0044; box-shadow: inset 0 0 25px rgba(255, 0, 85, 0.6), 0 0 10px rgba(255, 0, 85, 0.4); } 
            100% { border-color: #ff0055; box-shadow: inset 0 0 5px rgba(255, 0, 85, 0.2), 0 0 0 rgba(255, 0, 85, 0.2); } 
        }
        .urgente { animation: pulse-urgente-card 1.2s infinite ease-in-out !important; border-left-color: #ff0055 !important; }

        /* Topo do Card: Hora e Tag XCONV */
        .card-top { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .col-hora { font-family: 'JetBrains Mono', monospace; font-weight: 800; color: #fff; font-size: 1.4rem; display: flex; gap: 10px; align-items: center; }
        .xconv-tag { font-weight: 900; font-family: 'JetBrains Mono'; color: var(--accent-blue); font-size: 1rem; }
        
        /* Nome da Comissão */
        .comissao-name { font-weight: 700; color: #fff; font-size: 1.2rem; white-space: normal; line-height: 1.3; margin: 10px 0; }
        
        /* =====================================================================
           8. PÍLULAS DE INFORMAÇÃO (Sala, GC, etc)
           O QUE FAZ: Tags inferiores para leitura de batida de olho.
           ===================================================================== */
        .card-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: auto; }
        .pill {
            flex: 1 1 auto; 
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 10px; border-radius: 6px; font-size: 0.9rem;
            display: flex; align-items: center; gap: 6px; white-space: nowrap; overflow: hidden;
        }
        .pill-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .info-val { color: var(--text-main); font-weight: 800; }
        .val-pendente { color: #f85149; font-weight: 800; font-style: italic; }

        /* =====================================================================
           9. O BLOCO DE PAUTAS AGUARDANDO (Que era a Sidebar)
           O QUE FAZ: Fica lá embaixo da página como mais uma seção.
           ===================================================================== */
        .sidebar-aguardando { 
            width: 100%; background: #080a0f; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            display: none; flex-direction: column; padding: 15px 20px; box-sizing: border-box;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    
    <div class="main-layout">
        <div class="screen-container">
            <header>
                <h1 style="margin:0; font-size: 1.1rem; letter-spacing: 1px; opacity: 0.8; line-height: 1.2;">TV SENADO <br><span style="font-size: 0.8rem; color: var(--text-dim);">MONITORAMENTO</span></h1>
                <div id="clock">00:00</div>
            </header>

            <div class="active-area">
                <div id="group-iniciada" class="group-wrapper">
                    <div class="group-header title-iniciada">▶ NO AR</div>
                    <div id="scroll-iniciada" class="scroll-area"></div>
                </div>

                <div id="group-suspensa" class="group-wrapper">
                    <div class="group-header title-suspensa">⚠️ SUSPENSAS</div>
                    <div id="scroll-suspensa" class="scroll-area"></div>
                </div>

                <div id="group-encerrada" class="group-wrapper">
                    <div class="group-header title-encerrada">⏹️ ENCERRADAS</div>
                    <div id="scroll-encerrada" class="scroll-area"></div>
                </div>
            </div>
        </div>

        <aside id="sidebar-aguardando" class="sidebar-aguardando">
            <div class="group-header title-aguardando">⏳ PRÓXIMAS</div>
            <div id="scroll-aguardando" class="sidebar-list"></div>
        </aside>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // 2. CONFIGURAÇÃO COM AS SUAS CHAVES REAIS
    const firebaseConfig = {
        apiKey: "AIzaSyCRZXbRFqotcxdPAl6ptg06jDf_GpW2De8",
        authDomain: "sistema-tvsenado.firebaseapp.com",
        databaseURL: "https://sistema-tvsenado-default-rtdb.firebaseio.com",
        projectId: "sistema-tvsenado",
        storageBucket: "sistema-tvsenado.firebasestorage.app",
        messagingSenderId: "895965318952",
        appId: "1:895965318952:web:3eab09f06ce06d76674a1d"
    };

    // 3. INICIALIZANDO O FIREBASE MOBILE
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('pauta_tv_senado');

    let lastDataHash = "";

    // 4. ESCUTANDO A NUVEM EM TEMPO REAL (Fim do localStorage)
    db.on('value', (snapshot) => {
        const pautaNuvem = snapshot.val() || [];
        renderizarMonitor(pautaNuvem);
    });

    // Mantém o relógio rodando a cada segundo
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }, 1000);

    // 5. FUNÇÃO DE RENDERIZAÇÃO ADAPTADA
    function renderizarMonitor(p) {
        const grids = {
            'iniciada': document.getElementById('scroll-iniciada'),
            'suspensa': document.getElementById('scroll-suspensa'),
            'encerrada': document.getElementById('scroll-encerrada'),
            'aguardando': document.getElementById('scroll-aguardando')
        };

        // Limpa as áreas antes de desenhar
        Object.values(grids).forEach(g => g.innerHTML = '');
        
        // Ordena os dados da nuvem por Hora
        let pCopia = [...p];
        pCopia.sort((a, b) => a.hora.localeCompare(b.hora));

        const check = (val) => (val && val.trim() !== "") ? `<span class="info-val">${val}</span>` : `<span class="info-val val-pendente">---</span>`;

        pCopia.forEach(i => {
            const rawSt = (i.status || 'aguardando').toLowerCase();
            let st = 'encerrada';
            if (['iniciada', 'iniciado', 'no ar'].includes(rawSt)) st = 'iniciada';
            else if (['suspensa', 'suspenso'].includes(rawSt)) st = 'suspensa';
            else if (['aguardando', 'proxima', 'próxima'].includes(rawSt)) st = 'aguardando';
            
            const card = document.createElement('div');
            const [h, m] = i.hora.split(':').map(Number);
            const agora = new Date();
            const pautaHora = new Date();
            pautaHora.setHours(h, m, 0);
            
            const diffMin = Math.floor((pautaHora - agora) / 60000);
            
            // Lógica de Urgência: Se faltar 5 min ou estiver atrasada até 2 horas
            let classeUrgente = (st === 'aguardando' && diffMin <= 5 && diffMin > -120) ? 'urgente' : '';
            
            card.className = `pauta-card status-${st} ${classeUrgente}`;
            
            card.innerHTML = `
                <div class="card-top">
                    <div class="col-hora">${i.hora} <span class="xconv-tag">${(i.xconv && i.xconv.trim() !== "") ? i.xconv : ''}</span></div>
                </div>
                <div class="comissao-name" title="${i.comissao}">${i.comissao}</div>
                
                <div class="card-pills">
                    <div class="pill"><span class="pill-label">SAL</span>${check(i.sala)}</div>
                    <div class="pill"><span class="pill-label">LIB</span><span class="info-val">${i.libra || '-'}</span></div>
                    <div class="pill"><span class="pill-label">GC</span>${check(i.gc)}</div>
                    <div class="pill"><span class="pill-label">OP</span>${check(i.gcop)}</div>
                    <div class="pill"><span class="pill-label">DTV</span>${check(i.dtv)}</div>
                </div>
            `;

            grids[st].appendChild(card);
        });

        // Mostra ou oculta as seções dependendo do conteúdo
        ['iniciada', 'suspensa', 'encerrada'].forEach(id => {
            const wrapper = document.getElementById('group-' + id);
            if (grids[id].children.length === 0) wrapper.style.display = 'none';
            else wrapper.style.display = 'flex';
        });

        const sidebar = document.getElementById('sidebar-aguardando');
        if (grids['aguardando'].children.length === 0) sidebar.style.display = 'none';
        else sidebar.style.display = 'flex';
    }
</script>
</body>
</html>
